<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A86FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06FFA5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#grad2)"/>
  
  <!-- Cloud icon -->
  <g transform="translate(250, 150)">
    <path d="M80 60 Q80 40 100 40 Q100 20 120 20 Q140 20 140 40 Q160 40 160 60 Q160 80 140 80 L100 80 Q80 80 80 60 Z" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Server racks -->
  <g transform="translate(150, 250)">
    <rect x="0" y="0" width="60" height="80" fill="white" opacity="0.2" rx="5"/>
    <rect x="10" y="10" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="30" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="50" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
  </g>
  
  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="60" height="80" fill="white" opacity="0.2" rx="5"/>
    <rect x="10" y="10" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="30" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="50" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
  </g>
  
  <g transform="translate(350, 250)">
    <rect x="0" y="0" width="60" height="80" fill="white" opacity="0.2" rx="5"/>
    <rect x="10" y="10" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="30" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
    <rect x="10" y="50" width="40" height="15" fill="white" opacity="0.4" rx="2"/>
  </g>
  
  <!-- Network connections -->
  <line x1="190" y1="290" x2="280" y2="290" stroke="white" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="290" y1="290" x2="380" y2="290" stroke="white" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="48" fill="white" font-weight="bold" opacity="0.9">3-Tier</text>
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="48" fill="white" font-weight="bold" opacity="0.9">Architecture</text>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.7">AWS Cloud Infrastructure</text>
</svg>
